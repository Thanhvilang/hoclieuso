<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Học liệu số & Giáo trình điện tử</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <script
      src="https://kit.fontawesome.com/a076d05399.js"
      crossorigin="anonymous"
    ></script>

    <style>
      :root {
        --bg1: #2a9d8f;
        --bg2: #5b2eae;
        --bg3: #ff8a00;
        --btn1: #ff8355;
        --btn2: #22b0ff;
        --btn3: #ff59a3;
        --btn4: #7bffff;
        --text: #fff;
        --maxW: 1080px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        font-family: "Inter", sans-serif;
        background:
          radial-gradient(
            circle at 20% 20%,
            rgba(255, 255, 255, 0.2),
            transparent 40%
          ),
          linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
        color: var(--text);
        overflow-x: hidden;
        animation: pageIn 1s ease;
      }

      .floating-shapes {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .shape {
        position: absolute;
        border-radius: 50%;
        filter: blur(40px);
        opacity: 0.35;
        transform: scale(1);
        animation: float 8s ease-in-out infinite;
      }

      .shape.a {
        width: 220px;
        height: 220px;
        top: 10%;
        left: 8%;
        background: rgba(255, 163, 26, 0.6);
      }
      .shape.b {
        width: 300px;
        height: 300px;
        top: 65%;
        left: 75%;
        background: rgba(81, 41, 240, 0.4);
        animation-delay: 1.5s;
      }
      .shape.c {
        width: 180px;
        height: 180px;
        top: 40%;
        left: 50%;
        background: rgba(248, 102, 101, 0.45);
        animation-delay: 2s;
      }
      .shape.d {
        width: 260px;
        height: 260px;
        top: 80%;
        left: 20%;
        background: rgba(40, 199, 229, 0.35);
        animation-delay: 3s;
      }

      .container {
        position: relative;
        z-index: 1;
        max-width: var(--maxW);
        margin: 0 auto;
        padding: 3rem 1.2rem 2.4rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      header h1 {
        font-size: clamp(1.75rem, 5vw, 3.2rem);
        font-weight: 800;
        letter-spacing: 0.06em;
        margin-bottom: 0.65rem;
        text-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
      }

      header p {
        font-size: clamp(1rem, 2.2vw, 1.35rem);
        max-width: 760px;
        margin-inline: auto;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.95);
      }

      .buttons-grid {
        margin-top: 2.4rem;
        display: grid;
        grid-template-columns: repeat(2, minmax(220px, 1fr));
        gap: 1.2rem;
        width: 100%;
        max-width: 860px;
        animation: cardAppearance 1.1s ease;
      }

      .btn-main {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.8rem;
        background: rgba(255, 255, 255, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-radius: 18px;
        padding: 1.1rem 1.5rem;
        color: #fff;
        font-size: 1.06rem;
        font-weight: 600;
        text-decoration: none;
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
        transition:
          transform 0.22s ease,
          box-shadow 0.22s ease,
          background 0.22s ease,
          color 0.22s ease;
        cursor: pointer;
        outline: none;
        user-select: none;
        min-height: 70px;
      }

      #button1 {
        background: linear-gradient(135deg, #ff6a00, #ffcb05);
        border-color: rgba(255, 151, 0, 0.9);
      }

      #button2 {
        background: linear-gradient(135deg, #1e90ff, #55c6ff);
        border-color: rgba(13, 153, 255, 0.9);
      }

      #button3 {
        background: linear-gradient(135deg, #ff3a6e, #ff87c8);
        border-color: rgba(255, 95, 155, 0.9);
      }

      #button4 {
        background: linear-gradient(135deg, #00d8ff, #6a00ff);
        border-color: rgba(106, 0, 255, 0.9);
      }

      #button5 {
        background: linear-gradient(135deg, #ff4500, #ffa500);
        border-color: rgba(255, 69, 0, 0.9);
      }

      #button6 {
        background: linear-gradient(135deg, #32cd32, #00ff7f);
        border-color: rgba(50, 205, 50, 0.9);
      }

      #button1:hover,
      #button2:hover,
      #button3:hover,
      #button4:hover,
      #button5:hover,
      #button6:hover {
        transform: translateY(-3px) scale(1.03);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
        color: #fff;
      }

      #button1:hover {
        background: linear-gradient(135deg, #ff7b1a, #ffdf4f);
      }
      #button2:hover {
        background: linear-gradient(135deg, #2aabff, #79ddff);
      }
      #button3:hover {
        background: linear-gradient(135deg, #ff4f88, #ff9ed6);
      }
      #button4:hover {
        background: linear-gradient(135deg, #23e5ff, #8a43ff);
      }

      #button5:hover {
        background: linear-gradient(135deg, #ff6347, #ffb347);
      }

      #button6:hover {
        background: linear-gradient(135deg, #228b22, #00fa9a);
      }

      .btn-main i {
        font-size: 1.3rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.2);
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.25);
      }

      .btn-main:hover {
        transform: translateY(-3px) scale(1.03);
        background: rgba(255, 255, 255, 0.35);
        box-shadow: 0 14px 35px rgba(0, 0, 0, 0.3);
      }

      .btn-main:active {
        transform: scale(0.98);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
      }

      footer {
        margin-top: 2.6rem;
        padding: 0.8rem 0.6rem;
        width: min(100%, var(--maxW));
        color: rgba(255, 255, 255, 0.85);
        font-size: 0.95rem;
      }

      @keyframes pageIn {
        0% {
          opacity: 0;
          transform: translateY(18px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes cardAppearance {
        0% {
          opacity: 0;
          transform: translateY(20px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-24px) scale(1.05);
        }
      }

      @media (max-width: 800px) {
        .buttons-grid {
          grid-template-columns: 1fr;
        }
        header {
          margin-top: 0.4rem;
        }
      }

      @media (max-width: 450px) {
        .container {
          padding: 2rem 1rem 1.4rem;
        }
        header h1 {
          font-size: 2rem;
        }
        .btn-main {
          padding: 1rem 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="floating-shapes">
      <span class="shape a"></span>
      <span class="shape b"></span>
      <span class="shape c"></span>
      <span class="shape d"></span>
    </div>

    <div class="container">
      <header>
        <h1>Học liệu số &amp; Giáo trình điện tử</h1>
        <p>
          Revolutionizing the Way You Learn: Explore a World of Digital Learning
          Resources and E-Textbooks!
        </p>
      </header>

      <main class="buttons-grid">
        <a class="btn-main" id="button1" href="#" target="_blank">
          <i class="fas fa-book-open"></i>
          Giáo trình điện tử
        </a>
        <a class="btn-main" id="button2" href="#" target="_blank">
          <i class="fas fa-chalkboard-teacher"></i>
          Bài giảng điện tử
        </a>
        <a class="btn-main" id="button3" href="#" target="_blank">
          <i class="fas fa-gamepad"></i>
          Tài liệu trò chơi
        </a>
        <a class="btn-main" id="button4" href="#" target="_blank">
          <i class="fas fa-download"></i>
          Link tải eXeLearning
        </a>
        <a class="btn-main" id="button5" href="#" target="_blank">
          <i class="fas fa-tasks"></i>
          Nộ[ bài tập tập huấn
        </a>
        <a class="btn-main" id="button6" href="#" target="_blank">
          <i class="fas fa-video"></i>
          Video bài tập huấn
        </a>
      </main>

      <footer>
        <p>Knowledge Without Limits, Powered by Technology!</p>
      </footer>
    </div>

    <script>
      const links = {
        button1:
          "https://drive.google.com/drive/folders/11yMqC9VmDioL1VgmCqew-8nUtgsBc56p",
        button2:
          "https://drive.google.com/drive/folders/1qRu2VfogA5ZLCcP0OdEw1Krr3LgIEsor",
        button3:
          "https://descargas.intef.es/cedec/exe_learning/Manuales/manual_exe29/juegos.html",
        button4: "https://exelearning.net/en/previous-versions/",
        button5:
          "https://drive.google.com/drive/folders/1KX9llAZDee8BQEgI7QQZRZstnSopJhji",
        button6:
          "https://drive.google.com/drive/folders/1WBTdCNJPXJwyppoXeUVdhiNBFK_QULd7",
      };

      for (const id in links) {
        document.getElementById(id).addEventListener("click", (e) => {
          e.preventDefault();
          window.open(links[id], "_blank");
        });
      }
    </script>
  </body>
</html>
